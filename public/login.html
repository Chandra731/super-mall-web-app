<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Super Mall - Login Page">
    <meta name="keywords" content="Super Mall, Login">
    <meta name="author" content="Super Mall Team">
    <title>Login - Super Mall Web App</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="css/tailwind.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-100">
    <div class="container mx-auto py-16">
        <h2 class="text-3xl font-bold mb-8 text-center">Login</h2>
        <form id="login-form" class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">
            <div class="mb-4">
                <label for="loginEmail" class="block text-lg font-bold mb-2">Email</label>
                <input type="email" id="loginEmail" class="w-full p-3 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="loginPassword" class="block text-lg font-bold mb-2">Password</label>
                <input type="password" id="loginPassword" class="w-full p-3 border border-gray-300 rounded-md" required>
            </div>
            <button type="button" onclick="loginUser()" class="w-full px-6 py-3 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">Login</button>
            <button type="button" onclick="loginWithGoogle()" class="w-full mt-4 px-6 py-3 bg-red-500 text-white rounded-lg shadow hover:bg-red-600 transition">Login with Google</button>
        </form>
    </div>
    <script src="js/login.js"></script>
    <script src="js/google-login.js"></script>
</body>

</html>
