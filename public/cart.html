<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Super Mall - Shopping Cart">
    <meta name="keywords" content="Super Mall, Shopping Cart">
    <meta name="author" content="Super Mall Team">
    <title>Shopping Cart - Super Mall Web App</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="css/tailwind.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-gray-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-semibold">Super Mall</h1>
            <nav>
                <ul class="flex space-x-4" id="auth-links">
                    <li><a href="index.html" class="hover:underline">Home</a></li>
                    <li><a href="cart.html" class="hover:underline">Cart</a></li>
                    <li><a href="orders.html" class="hover:underline">Orders</a></li>
                    <li><a href="profile.html" class="hover:underline">Profile</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container mx-auto py-16">
        <h2 class="text-3xl font-bold mb-8 text-center">Shopping Cart</h2>
        <div id="cartItems" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cart items will be dynamically loaded here -->
        </div>
        <div class="mt-8 text-center">
            <h3 id="totalPrice" class="text-2xl font-bold">Total: ₹0</h3>
            <button onclick="checkout()" class="mt-4 px-6 py-3 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>&copy; 2025 Super Mall. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/cart.js"></script>
</body>

</html>
