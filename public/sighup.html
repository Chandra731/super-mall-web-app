<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Super Mall - Signup Page">
    <meta name="keywords" content="Super Mall, Signup">
    <meta name="author" content="Super Mall Team">
    <title>Signup - Super Mall Web App</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="css/tailwind.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-100">
    <div class="container mx-auto py-16">
        <h2 class="text-3xl font-bold mb-8 text-center">Signup</h2>
        <form id="signup-form" class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">
            <div class="mb-4">
                <label for="name" class="block text-lg font-bold mb-2">Name</label>
                <input type="text" id="name" class="w-full p-3 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="email" class="block text-lg font-bold mb-2">Email</label>
                <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-lg font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="role" class="block text-lg font-bold mb-2">Role</label>
                <select id="role" class="w-full p-3 border border-gray-300 rounded-md" required>
                    <option value="customer">Customer</option>
                    <option value="shop_owner">Shop Owner</option>
                </select>
            </div>
            <button type="button" onclick="signUpUser()" class="w-full px-6 py-3 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">Signup</button>
        </form>
    </div>
    <script src="js/signup.js"></script>
    <script>
        document.getElementById('role').addEventListener('change', function() {
            const shopDetails = document.getElementById('shop-details');
            if (this.value === 'shop_owner') {
                shopDetails.classList.remove('hidden');
            } else {
                shopDetails.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
